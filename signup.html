<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CDNO | Sign Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>


  <section class="section" style="min-height:100vh; display:grid; place-items:center; padding:120px 0 60px;">
    <div class="container" style="max-width:720px;">
      <div class="contact-form" style="padding:36px;">
        <div class="brand" style="margin-bottom:18px;">
          <div class="brand-mark"><img src="./assets/logo.jpg" alt="CDNO Logo" /></div>
          <span>CDNO</span>
        </div>


        <span class="eyebrow">CREATE ACCOUNT</span>
        <h2 style="font-size:2.2rem; margin-bottom:10px;">Set up your profile</h2>
        <p style="color:var(--text-muted); margin-bottom:24px;">Create a local account for your personalized feed.</p>


        <form id="signupForm" style="display:grid; gap:16px;">
          <input type="text" id="signupName" placeholder="Full Name" required />
          <input type="email" id="signupEmail" placeholder="Email" required />
          <input type="password" id="signupPassword" placeholder="Password" required />
          <input type="tel" id="signupPhone" placeholder="Phone Number" required />
          <input type="text" id="signupInstagram" placeholder="Instagram Username (optional)" />
          <input type="text" id="signupWhatsapp" placeholder="WhatsApp Number / Status (optional)" />
          <select id="signupPrivacy" required>
            <option value="Private Profile">Private Profile</option>
            <option value="Friends Only">Friends Only</option>
            <option value="Public Profile">Public Profile</option>
          </select>
          <button type="submit" class="btn btn-primary">Create Account</button>
        </form>


        <p style="margin-top:18px; color:var(--text-muted);">
          Already have an account? <a href="login.html" style="color:#fff; font-weight:600;">Login</a>
        </p>


        <p id="signupError" style="margin-top:14px; color:#ff9f9f; display:none;"></p>
      </div>
    </div>
  </section>


  <script src="./js/database.js"></script>
  <script src="./js/auth.js"></script>
</body>
</html>
