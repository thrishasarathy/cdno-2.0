<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CDNO | Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>


  <section class="section" style="min-height:100vh; padding:120px 0 60px;">
    <div class="container" style="max-width:900px;">
      <div class="section-head" style="text-align:left; margin-bottom:28px;">
        <div class="brand" style="margin-bottom:18px;">
          <div class="brand-mark"><img src="./assets/logo.jpg" alt="CDNO Logo" /></div>
          <span>CDNO</span>
        </div>
        <span class="eyebrow">PROFILE</span>
        <h2>Account Overview</h2>
        <p>Your local profile and personalization settings.</p>
      </div>


      <div class="feature-grid" style="grid-template-columns:1fr 1fr;">
        <div class="feature-card">
          <h3 id="profileName">User</h3>
          <p id="profileEmail">Email</p>
          <p id="profilePhone">Phone</p>
          <p id="profilePrivacy">Privacy</p>
        </div>


        <div class="feature-card">
          <h3>Connected Platforms</h3>
          <p id="profileInstagram">Instagram: Not connected</p>
          <p id="profileWhatsapp">WhatsApp: Not connected</p>
          <p>Notification Engine: Enabled</p>
        </div>
      </div>


      <div style="margin-top:28px; display:flex; gap:14px; flex-wrap:wrap;">
        <a href="notifications.html" class="btn btn-primary">Open Dashboard</a>
        <a href="index.html" class="btn btn-secondary">Back Home</a>
        <button id="logoutProfileBtn" class="btn btn-secondary">Logout</button>
      </div>
    </div>
  </section>


  <script src="./js/database.js"></script>
  <script src="./js/auth.js"></script>
</body>
</html>
