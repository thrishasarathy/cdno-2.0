<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CDNO | Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>


  <section class="section" style="min-height:100vh; display:grid; place-items:center; padding:120px 0 60px;">
    <div class="container" style="max-width:560px;">
      <div class="contact-form" style="padding:36px;">
        <div class="brand" style="margin-bottom:18px;">
          <div class="brand-mark"><img src="./assets/logo.jpg" alt="CDNO Logo" /></div>
          <span>CDNO</span>
        </div>


        <span class="eyebrow">SECURE ACCESS</span>
        <h2 style="font-size:2.2rem; margin-bottom:10px;">Login to My Noti Board</h2>
        <p style="color:var(--text-muted); margin-bottom:24px;">Access your personalized notification dashboard.</p>


        <form id="loginForm" style="display:grid; gap:16px;">
          <input type="email" id="loginEmail" placeholder="Email" required />
          <input type="password" id="loginPassword" placeholder="Password" required />
          <button type="submit" class="btn btn-primary">Login</button>
        </form>


        <p style="margin-top:18px; color:var(--text-muted);">
          New here? <a href="signup.html" style="color:#fff; font-weight:600;">Create account</a>
        </p>


        <p id="loginError" style="margin-top:14px; color:#ff9f9f; display:none;"></p>
      </div>
    </div>
  </section>


  <script src="./js/database.js"></script>
  <script src="./js/auth.js"></script>
</body>
</html>
